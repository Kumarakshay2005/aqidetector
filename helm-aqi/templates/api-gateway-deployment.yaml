{{- if .Values.services.apiGateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aqi-microservices.fullname" . }}-api-gateway
  labels:
    {{- include "aqi-microservices.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "aqi-microservices.fullname" . }}-api-gateway
  template:
    metadata:
      labels:
        app: {{ include "aqi-microservices.fullname" . }}-api-gateway
        {{- include "aqi-microservices.labels" . | nindent 8 }}
    spec:
      {{- if .Values.services.apiGateway.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.services.apiGateway.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.services.apiGateway.affinity }}
      affinity:
        {{- toYaml .Values.services.apiGateway.affinity | nindent 8 }}
      {{- end }}
      containers:
        - name: api-gateway
          image: "{{ .Values.services.apiGateway.image.repository }}:{{ .Values.services.apiGateway.image.tag }}"
          imagePullPolicy: {{ .Values.services.apiGateway.image.pullPolicy }}
          {{- if .Values.services.apiGateway.securityContext }}
          securityContext:
            {{- toYaml .Values.services.apiGateway.securityContext | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.services.apiGateway.containerPort }}
          {{- if .Values.services.apiGateway.env }}
          env:
            {{- range $k, $v := .Values.services.apiGateway.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.services.apiGateway.resources | nindent 12 }}
---
{{- end }}
