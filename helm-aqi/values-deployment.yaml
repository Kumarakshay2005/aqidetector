services:
  ingress:
    enabled: true
    className: nginx
    annotations: {}
    host: aqi.local
    path: /
    pathType: Prefix
    tls:
      enabled: false
      secretName: ""

  frontend:
    enabled: true
    replicaCount: 2
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    image:
      repository: akshaysharma15791/aqidetector-frontend
      tag: v1.0.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3000
      targetPort: 3000
    containerPort: 3000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    affinity: {}

  apiGateway:
    enabled: true
    replicaCount: 2
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    image:
      repository: akshaysharma15791/aqidetector-api-gateway
      tag: v1.0.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 4000
      targetPort: 4000
    containerPort: 4000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    affinity: {}

  aqiService:
    enabled: true
    replicaCount: 2
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    image:
      repository: akshaysharma15791/aqidetector-api-service
      tag: v1.0.0
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 5000
      targetPort: 5000
    containerPort: 5000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    affinity: {}
