name: Build Push And Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            image: aqidetector-frontend
          - service: api-gateway
            context: ./services/api-gateway
            image: aqidetector-api-gateway
          - service: api-service
            context: ./services/aqi-service
            image: aqidetector-api-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest

  deploy-to-eks:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "${{ secrets.AWS_REGION }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install aqi-app ./helm-aqi \
            --namespace "${{ secrets.EKS_NAMESPACE }}" \
            --create-namespace \
            -f ./helm-aqi/values-deployment.yaml \
            -f ./helm-aqi/values-env.yaml \
            --set services.frontend.image.repository="${{ secrets.DOCKERHUB_USERNAME }}/aqidetector-frontend" \
            --set services.frontend.image.tag="${{ github.sha }}" \
            --set services.apiGateway.image.repository="${{ secrets.DOCKERHUB_USERNAME }}/aqidetector-api-gateway" \
            --set services.apiGateway.image.tag="${{ github.sha }}" \
            --set services.aqiService.image.repository="${{ secrets.DOCKERHUB_USERNAME }}/aqidetector-api-service" \
            --set services.aqiService.image.tag="${{ github.sha }}"
