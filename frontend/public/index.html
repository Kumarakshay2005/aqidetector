<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nearby AQI Finder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Nearby AQI Finder</h1>
        <p class="subtitle">Enter your name and location to check nearby air quality.</p>

        <form id="aqiForm" class="form">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />

          <label for="location">Location</label>
          <input
            id="location"
            name="location"
            type="text"
            placeholder="City or area (for example, Bengaluru)"
            required
          />

          <button type="submit">Check AQI</button>
        </form>

        <section id="result" class="result hidden" aria-live="polite"></section>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
